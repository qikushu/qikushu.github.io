baseURL: https://qikushu.github.io/
title: Plant Breeding Lab | Kyushu University

############################
## Hugo Blox Builder
############################
module:
  imports:
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-plugin-netlify
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-plugin-reveal
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-tailwind

############################
## Language Configuration
############################
defaultContentLanguage: ja
defaultContentLanguageInSubdir: true

languages:
  ja:
    languageName: 日本語
    languageCode: ja
    contentDir: content/ja
    weight: 1
    title: 植物育種学研究室 | 九州大学
    params:
      description: 九州大学大学院農学研究院 植物育種学研究室
    menu:
      main:
        - name: ホーム
          url: /
          weight: 10
        - name: 研究
          url: /research/
          weight: 20
        - name: 業績
          url: /publication/
          weight: 30
        - name: メンバー
          url: /people/
          weight: 40
        - name: 教育
          url: /teaching/
          weight: 50
        - name: アクセス
          url: /contact/
          weight: 60

  en:
    languageName: English
    languageCode: en
    contentDir: content/en
    weight: 2
    title: Plant Breeding Lab | Kyushu University
    params:
      description: Plant Breeding Laboratory, Faculty of Agriculture, Kyushu University
    menu:
      main:
        - name: Home
          url: /
          weight: 10
        - name: Research
          url: /research/
          weight: 20
        - name: Publications
          url: /publication/
          weight: 30
        - name: Members
          url: /people/
          weight: 40
        - name: Teaching
          url: /teaching/
          weight: 50
        - name: Access
          url: /contact/
          weight: 60

############################
## Site Parameters
############################
params:
  theme: midnight
  appearance:
    mode: dark
    color: midnight

  # SEO
  site_type: Organization
  org_name: Kyushu University - Plant Breeding Laboratory
  local_business_type: EducationalOrganization

  # Contact
  email: hyasui@agr.kyushu-u.ac.jp
  address:
    street: 744 Motooka, Nishi-ku
    city: Fukuoka
    postcode: 819-0395
    country: Japan
    country_code: JP

  # Features
  math: true
  highlight: true
  highlight_languages:
    - r
    - python
    - bash
    - perl

  # i18n
  show_language_toggle: true

  # Footer
  copyright: "© {year} Plant Breeding Laboratory, Kyushu University"

############################
## Hugo Options
############################
markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    codeFences: true
    lineNos: false

enableRobotsTXT: true
enableEmoji: false

taxonomies:
  tag: tags
  category: categories
  author: authors
